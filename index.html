<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Мини-приложение</title>
    <link rel="stylesheet" href="./fonts/fonts.css" />
    <link rel="icon" href="./images/logo.ico" sizes="any" />
    <link rel="stylesheet" href="./styles/styles.css" />
  </head>
  <body>
    <section id="page1" class="page">
      <h1>Страница приветствия</h1>
      <p>
        Первая страница с текстом приветствия и
        <a href="#" id="second-page-link">ссылкой</a>
        на вторую страницу.
      </p>
      <button class="button" id="go-to-second-page">
        Перейти на вторую страницу
      </button>
    </section>
    <section id="page2" class="page hidden-page">
      <p id="selected-menu"></p>
      <p id="selected-info"></p>
      <template id="menu-item-template">
        <div class="menu-item">
          <input type="checkbox" id="" data-id="" />
          <label for="">Пункт</label>
          <span class="value">(0)</span>
        </div>
      </template>
      <div class="menu-selector">
        <button class="menu-button" data-menu-id="1">Завтрак</button>
        <button class="menu-button" data-menu-id="2">Обед</button>
        <button class="menu-button" data-menu-id="3">Ужин</button>
      </div>
      <div id="menu-container"></div>
      <button class="button" id="go-to-first-page">
        Вернуться на первую страницу
      </button>
    </section>
    <script type="module" src="dist/main.js"></script>
  </body>
</html>
