<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Мини-приложение</title>
    <link rel="stylesheet" href="./fonts/fonts.css" />
    <link rel="icon" href="./images/logo.ico" sizes="any" />
    <link rel="stylesheet" href="./styles/styles.css" />
  </head>
  <body>
    <section id="page1" class="page active-page">
      <h1>Страница приветствия</h1>
      <p>Первая страница с текстом приветствия и ссылкой на вторую страницу.</p>
      <button class="button" id="go-to-second-page">
        Перейти на вторую страницу
      </button>
    </section>
    <section id="page2" class="page">
      <h1 id="selection-info">Выбрано: 0, сумма: 0</h1>
      <label for="menu-select">Выберите меню:</label>
      <select id="menu-select">
        <option value="1">Завтрак</option>
        <option value="2">Обед</option>
        <option value="3">Ужин</option>
      </select>
      <div id="menu-container"></div>
      <button class="button" id="go-to-first-page">
        Вернуться на первую страницу
      </button>
    </section>

    <script type="module" src="dist/script.js"></script>
  </body>
</html>
